```html
<!DOCTYPE html>
<html>
<head>

<title>Result</title>

<style>

body{
background:#1e3c72;
font-family:Arial;
color:white;
text-align:center;
margin-top:150px;
}

.card{
background:white;
color:#1e3c72;
width:400px;
margin:auto;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.score{
font-size:70px;
font-weight:bold;
animation:zoom 1s infinite alternate;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.3);}
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
background:#1e3c72;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h1>Your Score</h1>

<div class="score" id="score"></div>

<button onclick="restart()">Take Another Test</button>

</div>

<script>

let score=localStorage.getItem("score")

document.getElementById("score").innerHTML=score+" / 10 🎉"

function restart(){
window.location="index.html"
}

</script>

</body>
</html>
