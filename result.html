<!DOCTYPE html>
<html>
<head>

<title>Result</title>

<style>

body{
background:#1e3799;
color:white;
text-align:center;
font-family:Arial;
margin-top:150px;
overflow:hidden;
}

.score{
font-size:70px;
font-weight:bold;
animation:zoom 1s infinite alternate;
}

@keyframes zoom{

from{transform:scale(1);}
to{transform:scale(1.3);}

}

canvas{
position:fixed;
top:0;
left:0;
}

</style>

</head>

<body>

<h1>Your Score</h1>

<div class="score" id="score"></div>

<script>

let score=localStorage.getItem("score");

document.getElementById("score").innerHTML=score+" / 10 🎉";

</script>

</body>
</html>
