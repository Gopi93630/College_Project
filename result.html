<!DOCTYPE html>
<html>
<head>

<title>Exam Result</title>

<style>

body{
background:#0a3d62;
color:white;
text-align:center;
font-family:Arial;
margin-top:150px;
}

.card{

background:white;
color:#0a3d62;
width:400px;
margin:auto;
padding:40px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);

}

.score{

font-size:70px;
font-weight:bold;
animation:zoom 1s infinite alternate;

}

@keyframes zoom{

from{transform:scale(1);}
to{transform:scale(1.3);}

}

</style>

</head>

<body>

<div class="card">

<h1>Exam Result</h1>

<div class="score" id="score"></div>

<p>TNPSC Practice Test</p>

</div>

<script>

let score = localStorage.getItem("score");

document.getElementById("score").innerHTML =
score + " / 10 🎉";

</script>

</body>
</html>
