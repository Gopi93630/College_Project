<!DOCTYPE html>
<html>
<head>
<title>TNPSC Mock Test</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
text-align:center;
}

.container{
width:70%;
margin:auto;
}

.question{
background:white;
padding:20px;
margin:20px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

button{
padding:12px 30px;
font-size:18px;
background:#1e3799;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>TNPSC Mock Test</h1>

<div class="container">

<form id="quizForm">

<div class="question">
<p>1. Capital of Tamil Nadu?</p>

<label><input type="radio" name="q1" value="1"> Chennai</label><br>
<label><input type="radio" name="q1" value="0"> Madurai</label><br>
<label><input type="radio" name="q1" value="0"> Salem</label>
</div>


<div class="question">
<p>2. Father of Nation?</p>

<label><input type="radio" name="q2" value="1"> Mahatma Gandhi</label><br>
<label><input type="radio" name="q2" value="0"> Nehru</label><br>
<label><input type="radio" name="q2" value="0"> Ambedkar</label>
</div>


<div class="question">
<p>3. National Animal?</p>

<label><input type="radio" name="q3" value="1"> Tiger</label><br>
<label><input type="radio" name="q3" value="0"> Lion</label><br>
<label><input type="radio" name="q3" value="0"> Elephant</label>
</div>


<button type="button" onclick="submitQuiz()">Submit Test</button>

</form>

</div>

<script>

function submitQuiz(){

let score = 0;

let answers = ["q1","q2","q3"];

for(let i=0;i<answers.length;i++){

let q = document.getElementsByName(answers[i]);

for(let j=0;j<q.length;j++){

if(q[j].checked){

score += Number(q[j].value);

}

}

}

localStorage.setItem("score",score);

window.location.href="result.html";

}

</script>

</body>
</html>
