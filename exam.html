<!DOCTYPE html>
<html>
<head>

<title>TNPSC Quiz</title>

<style>

body{
font-family:Arial;
background:#ecf0f1;
margin:0;
}

header{
background:#0a3d62;
color:white;
padding:15px;
text-align:center;
}

.container{
width:80%;
margin:auto;
margin-top:30px;
}

.question{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

button{
padding:12px 30px;
background:#0a3d62;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#07406b;
}

</style>

</head>

<body>

<header>

<h2 id="title"></h2>

</header>

<div class="container">

<form id="quizForm">

<div id="questions"></div>

<button type="button" onclick="submitQuiz()">Submit Test</button>

</form>

</div>


<script>

let topic = localStorage.getItem("topic");

document.getElementById("title").innerHTML =
topic.toUpperCase() + " QUIZ";

let questionBank = {

tamil:[

{
q:"திருக்குறள் மொத்தம் எத்தனை குறள்களை கொண்டது?",
o:["1200","1330","1400","1500"],
a:1
},

{
q:"சிலப்பதிகாரம் எந்த இலக்கிய வகையைச் சேர்ந்தது?",
o:["நூல்","காப்பியம்","கவிதை","பாடல்"],
a:1
},

{
q:"பாரதியார் பிறந்த இடம்?",
o:["சென்னை","எட்டயபுரம்","மதுரை","திருச்சி"],
a:1
},

{
q:"தமிழ் இலக்கியத்தில் சங்க காலம் எத்தனை?",
o:["2","3","4","5"],
a:1
},

{
q:"தொல்காப்பியம் எந்த வகை நூல்?",
o:["இலக்கணம்","கவிதை","காப்பியம்","புராணம்"],
a:0
},

{
q:"திருவள்ளுவர் எழுதிய நூல்?",
o:["சிலப்பதிகாரம்","திருக்குறள்","மணிமேகலை","கம்பராமாயணம்"],
a:1
},

{
q:"கம்பராமாயணம் எழுதியவர்?",
o:["கம்பர்","பாரதி","அவ்வையார்","இளங்கோ"],
a:0
},

{
q:"மணிமேகலை எழுதியவர்?",
o:["சாத்தனார்","கம்பர்","திருவள்ளுவர்","பாரதி"],
a:0
},

{
q:"தமிழ் மொழி எந்த மொழிக்குடும்பம்?",
o:["திராவிட","இந்தோ","ஆஸ்ட்ரிக்","சீன"],
a:0
},

{
q:"புறநானூறு எந்த இலக்கியம்?",
o:["சங்க","பக்தி","நூல்","காப்பியம்"],
a:0
}

],

maths:[

{
q:"25² = ?",
o:["500","625","725","575"],
a:1
},

{
q:"144 இன் வர்க்கமூலம்?",
o:["10","11","12","14"],
a:2
},

{
q:"15 × 12 = ?",
o:["150","170","180","190"],
a:2
},

{
q:"100 ÷ 5 = ?",
o:["10","15","20","25"],
a:2
},

{
q:"12 + 18 = ?",
o:["28","30","32","36"],
a:1
},

{
q:"9 × 9 = ?",
o:["72","81","91","99"],
a:1
},

{
q:"20 − 7 = ?",
o:["11","12","13","14"],
a:2
},

{
q:"7 × 8 = ?",
o:["54","56","58","60"],
a:1
},

{
q:"50 ÷ 10 = ?",
o:["3","4","5","6"],
a:2
},

{
q:"100 + 200 = ?",
o:["200","250","300","350"],
a:2
}

]

};


let questions = questionBank[topic];

let html="";

for(let i=0;i<questions.length;i++){

html+=`
<div class="question">

<p>${i+1}. ${questions[i].q}</p>

<label><input type="radio" name="q${i}" value="0"> ${questions[i].o[0]}</label><br>
<label><input type="radio" name="q${i}" value="1"> ${questions[i].o[1]}</label><br>
<label><input type="radio" name="q${i}" value="2"> ${questions[i].o[2]}</label><br>
<label><input type="radio" name="q${i}" value="3"> ${questions[i].o[3]}</label>

</div>
`;
}

document.getElementById("questions").innerHTML=html;



function submitQuiz(){

let score=0;

for(let i=0;i<questions.length;i++){

let q=document.getElementsByName("q"+i);

for(let j=0;j<q.length;j++){

if(q[j].checked && q[j].value==questions[i].a){

score++;

}

}

}

localStorage.setItem("score",score);

window.location="result.html";

}

</script>

</body>
</html>
